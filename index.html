<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kuala Proxy — Правовая информация</title>
<style>
  :root{--bg:#EBF5F0;--surface:#fff;--accent:#259B6A;--accent-deep:#1A7550;--tint:#D4EDE3;--text:#0E2A1C;--muted:#527A63;--sep:#C2DECE}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);line-height:1.6;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:560px;margin:0 auto;padding:64px 20px;text-align:center}
  .icon{width:80px;height:80px;border-radius:50%;background:var(--tint);
    display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:38px}
  h1{font-size:26px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:15px;margin:0 0 32px}
  .links{display:flex;flex-direction:column;gap:12px;max-width:360px;margin:0 auto}
  .links a{display:block;background:var(--surface);border:1px solid var(--sep);border-radius:14px;
    padding:16px;color:var(--accent-deep);text-decoration:none;font-size:16px;font-weight:600}
  .links a:hover{border-color:var(--accent)}
  footer{margin-top:32px;font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon" aria-hidden="true">🦁</div>
  <h1>Kuala Proxy</h1>
  <p class="sub">Правовая информация</p>
  <div class="links">
    <a href="./privacy.html">Политика конфиденциальности</a>
    <a href="./terms.html">Условия использования</a>
  </div>
  <footer>© 2026 Kuala Proxy</footer>
</div>
</body>
</html>
